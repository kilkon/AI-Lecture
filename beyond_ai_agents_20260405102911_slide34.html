<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Thank You - Beyond the Age of AI Agents</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0a0a0f;
            font-family: 'Inter', sans-serif;
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #1a1a2e 0%, #0f0f1e 100%);
        }
        
        .hero-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        
        .hero-background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            filter: blur(40px);
        }
        
        .hero-background::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><circle cx="50" cy="50" r="1" fill="rgba(255,255,255,0.1)"/></svg>') repeat;
            background-size: 100px 100px;
            opacity: 0.3;
        }
        
        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 80px;
        }
        
        .main-title {
            font-size: 60px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 50%, #c7d2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -2px;
            line-height: 1.1;
        }
        
        .subtitle {
            font-size: 36px;
            font-weight: 400;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 48px;
        }
        
        .subtitle-highlight {
            color: #60a5fa;
            font-weight: 500;
        }
        
        .acknowledgment {
            font-size: 18px;
            color: #64748b;
            text-align: center;
            margin-top: 48px;
            max-width: 800px;
        }
        
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 8px;
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 50%, #6366f1 100%);
        }
        
        .floating-elements {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 5;
        }
        
        .floating-icon {
            position: absolute;
            color: rgba(255, 255, 255, 0.1);
            font-size: 24px;
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }
        
        .logo-area {
            position: absolute;
            top: 40px;
            left: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }
        
        .logo-text {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }
        
        .logo-subtext {
            font-size: 12px;
            color: #94a3b8;
        }
        
        .date-info {
            position: absolute;
            top: 40px;
            right: 40px;
            text-align: right;
        }
        
        .date-text {
            font-size: 14px;
            color: #94a3b8;
        }
        
        .date-value {
            font-size: 16px;
            font-weight: 600;
            color: #e2e8f0;
        }
        
        .thank-you-icon {
            font-size: 80px;
            color: #60a5fa;
            margin-bottom: 24px;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }
        
        .contact-info {
            display: flex;
            align-items: center;
            gap: 32px;
            margin-top: 32px;
            padding: 16px 32px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            backdrop-filter: blur(10px);
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #e2e8f0;
        }
        
        .contact-icon {
            color: #60a5fa;
        }
        
        .divider {
            width: 1px;
            height: 24px;
            background: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
<div class="slide-container">
<div class="hero-background"></div>
<div class="floating-elements">
<div class="floating-icon" style="top: 15%; left: 10%; animation-delay: 0s;">
<i class="fas fa-robot"></i>
</div>
<div class="floating-icon" style="top: 25%; right: 15%; animation-delay: 1s;">
<i class="fas fa-brain"></i>
</div>
<div class="floating-icon" style="top: 60%; left: 5%; animation-delay: 2s;">
<i class="fas fa-network-wired"></i>
</div>
<div class="floating-icon" style="top: 70%; right: 10%; animation-delay: 3s;">
<i class="fas fa-microchip"></i>
</div>
</div>
<div class="logo-area">
<div class="logo-icon">
<i class="fas fa-university"></i>
</div>
<div>
<div class="logo-text">AI Native Campus</div>
<div class="logo-subtext">Strategic Transformation</div>
</div>
</div>
<div class="date-info">
<div class="date-text">Date</div>
<div class="date-value">April 2026</div>
</div>
<div class="content-wrapper">
<div class="thank-you-icon">
<i class="fas fa-hand-holding-heart"></i>
</div>
<div class="main-title">
                Beyond the Age of AI Agents
            </div>
<div class="subtitle">
<span class="subtitle-highlight">Questions &amp; Discussion</span>
</div>
<div class="acknowledgment">
                Based on keynotes from OpenAI, Microsoft, and Seoul National University SHINE AI
            </div>
<div class="contact-info">
<div class="contact-item">
<i class="fas fa-envelope contact-icon"></i>
<span>contact@university.edu</span>
</div>
<div class="divider"></div>
<div class="contact-item">
<i class="fas fa-globe contact-icon"></i>
<span>www.university.edu</span>
</div>
<div class="divider"></div>
<div class="contact-item">
<i class="fas fa-phone contact-icon"></i>
<span>+82-2-880-1234</span>
</div>
</div>
</div>
<div class="bottom-bar"></div>
</div>
</body>
</html>
