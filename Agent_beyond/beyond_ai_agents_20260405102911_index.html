<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beyond AI Agents - Unified Deck</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #11182d;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
      --border: #22304f;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #182443, #0b1020 45%);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      display: grid;
      grid-template-columns: 1fr auto auto;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(10, 15, 30, 0.88);
      backdrop-filter: blur(6px);
      z-index: 20;
    }
    .title {
      font-weight: 600;
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    button, select {
      height: 34px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 0 10px;
      font-size: 12px;
      cursor: pointer;
    }
    button:hover, select:hover { border-color: #32508a; }
    button.primary {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      border: none;
      color: white;
      font-weight: 600;
    }
    .meta {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
      white-space: nowrap;
    }
    .viewer-wrap {
      flex: 1;
      overflow: auto;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .canvas {
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.35);
      background: #000;
      transform-origin: top left;
      flex: 0 0 auto;
    }
    iframe {
      width: 1280px;
      height: 720px;
      border: 0;
      display: block;
      background: #000;
    }
    @media (max-width: 900px) {
      .topbar {
        grid-template-columns: 1fr;
        gap: 8px;
      }
      .title, .meta {
        text-align: center;
      }
      .controls {
        justify-content: center;
      }
      button, select {
        height: 36px;
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="title">Beyond the Age of AI Agents</div>
    <div class="controls">
      <button id="prevBtn">이전</button>
      <button id="nextBtn" class="primary">다음</button>
      <select id="slideSelect" aria-label="슬라이드 선택"></select>
      <button id="zoomOutBtn">A-</button>
      <button id="fitBtn">맞춤</button>
      <button id="zoomInBtn">A+</button>
      <button id="fullscreenBtn">전체화면</button>
    </div>
    <div class="meta" id="metaText"></div>
  </div>

  <div class="viewer-wrap" id="viewerWrap">
    <div class="canvas" id="canvas">
      <iframe id="slideFrame" title="Unified slides"></iframe>
    </div>
  </div>

  <script>
    const BASE_W = 1280;
    const BASE_H = 720;
    const prefix = "beyond_ai_agents_20260405102911_slide";
    const extension = ".html";
    const assetVersion = "20260418h";
    const slideNumbers = Array.from({ length: 34 }, (_, i) => i + 1);

    const frame = document.getElementById("slideFrame");
    const select = document.getElementById("slideSelect");
    const metaText = document.getElementById("metaText");
    const viewerWrap = document.getElementById("viewerWrap");
    const canvas = document.getElementById("canvas");

    const isMobile = window.matchMedia("(max-width: 900px)").matches;
    let idx = 0;
    let userZoom = isMobile ? 1.35 : 1.0; // 모바일 기본 가독성 강화

    function fileFor(n) {
      return `${prefix}${n}${extension}?v=${assetVersion}`;
    }

    function renderOptions() {
      select.innerHTML = "";
      slideNumbers.forEach((n, i) => {
        const opt = document.createElement("option");
        opt.value = String(i);
        opt.textContent = `Slide ${n}`;
        select.appendChild(opt);
      });
    }

    function getFitScale() {
      const pad = 8;
      const vw = Math.max(320, viewerWrap.clientWidth - pad * 2);
      const vh = Math.max(180, viewerWrap.clientHeight - pad * 2);
      return Math.min(vw / BASE_W, vh / BASE_H);
    }

    function applyScale() {
      const fit = getFitScale();
      const scale = fit * userZoom;
      canvas.style.width = `${BASE_W * scale}px`;
      canvas.style.height = `${BASE_H * scale}px`;
      canvas.style.borderRadius = `${Math.max(6, 12 * Math.min(1, scale))}px`;
      frame.style.transformOrigin = "top left";
      frame.style.transform = `scale(${scale})`;
      frame.style.width = `${BASE_W}px`;
      frame.style.height = `${BASE_H}px`;
      metaText.dataset.zoom = Math.round(userZoom * 100);
      updateMeta();
    }

    function updateMeta() {
      const n = slideNumbers[idx];
      metaText.textContent = `${idx + 1}/${slideNumbers.length} (원본: ${n}) | 확대 ${Math.round(userZoom * 100)}%`;
      document.title = `Slide ${n} - Unified Deck`;
    }

    function setSlide(newIdx) {
      if (newIdx < 0 || newIdx >= slideNumbers.length) return;
      idx = newIdx;
      const n = slideNumbers[idx];
      frame.src = fileFor(n);
      select.value = String(idx);
      updateMeta();
      history.replaceState(null, "", `#slide=${n}`);
    }

    function next() { setSlide(Math.min(idx + 1, slideNumbers.length - 1)); }
    function prev() { setSlide(Math.max(idx - 1, 0)); }

    function zoomIn() {
      userZoom = Math.min(2.4, +(userZoom + 0.1).toFixed(2));
      applyScale();
    }
    function zoomOut() {
      userZoom = Math.max(0.7, +(userZoom - 0.1).toFixed(2));
      applyScale();
    }
    function zoomFit() {
      userZoom = 1.0;
      applyScale();
    }

    document.getElementById("nextBtn").addEventListener("click", next);
    document.getElementById("prevBtn").addEventListener("click", prev);
    document.getElementById("zoomInBtn").addEventListener("click", zoomIn);
    document.getElementById("zoomOutBtn").addEventListener("click", zoomOut);
    document.getElementById("fitBtn").addEventListener("click", zoomFit);
    select.addEventListener("change", (e) => setSlide(Number(e.target.value)));

    document.getElementById("fullscreenBtn").addEventListener("click", () => {
      if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
      else document.exitFullscreen?.();
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "ArrowRight" || e.key === " ") { e.preventDefault(); next(); }
      if (e.key === "ArrowLeft") { e.preventDefault(); prev(); }
      if (e.key === "Home") { e.preventDefault(); setSlide(0); }
      if (e.key === "End") { e.preventDefault(); setSlide(slideNumbers.length - 1); }
      if (e.key.toLowerCase() === "f") {
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      }
      if (e.key === "+" || e.key === "=") { e.preventDefault(); zoomIn(); }
      if (e.key === "-" || e.key === "_") { e.preventDefault(); zoomOut(); }
      if (e.key === "0") { e.preventDefault(); zoomFit(); }
    });

    function initFromHash() {
      const match = location.hash.match(/slide=(\d+)/);
      if (!match) return 0;
      const requested = Number(match[1]);
      const found = slideNumbers.indexOf(requested);
      return found >= 0 ? found : 0;
    }

    window.addEventListener("resize", applyScale);

    renderOptions();
    setSlide(initFromHash());
    applyScale();
  </script>
</body>
</html>
