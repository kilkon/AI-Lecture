<!doctype html><html lang='ko'><head>
<meta charset="utf-8"/>
<title>LLM을 활용한 통계분석 파이프라인: DID와 Causal Forest</title>
<style>
      /* 기본 리셋 및 폰트 설정 */
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      /* 명시적인 사용자 요구사항에 따른 Body 스타일링 */
      body {
        background-color: #0b1120; /* 딥 네이비 계열 배경 */
        font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', Arial, sans-serif;
        color: #1e293b;
        margin: 0 auto;
        padding: 80px 20px;
        position: relative;
      }

      /* 내비게이션 바 */
      .top-nav {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        background-color: rgba(15, 23, 42, 0.95);
        padding: 15px 30px;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #1e293b;
      }
      .top-nav-title {
        color: #e2e8f0;
        font-weight: 700;
        font-size: 1.1rem;
      }
      .top-nav-links {
        display: flex;
        gap: 15px;
      }
      .top-nav-links a {
        color: #94a3b8;
        text-decoration: none;
        font-size: 0.9rem;
        font-weight: 500;
      }

      /* 슬라이드 공통 컨테이너 */
      .deck {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 60px; /* 슬라이드 사이 충분한 간격 */
        margin-top: 40px;
      }

      /* 개별 슬라이드 (16:9 비율 카드) */
      .slide {
        width: 90vw;
        max-width: 1400px;
        aspect-ratio: 16/9;
        background-color: #ffffff;
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        padding: 4% 5%;
        position: relative;
        display: flex;
        flex-direction: column;
        overflow: hidden; /* 스크롤바 방지 */
        text-align: left;
      }

      /* 타이포그래피 */
      h1 {
        font-size: 3.5rem;
        color: #0f172a;
        margin-bottom: 1rem;
        line-height: 1.3;
        letter-spacing: -0.02em;
      }
      h2 {
        font-size: 2.5rem;
        color: #0284c7; /* 청록/블루 포인트 */
        margin-bottom: 1.5rem;
        border-bottom: 3px solid #e0f2fe;
        padding-bottom: 0.5rem;
        display: inline-block;
      }
      h3 {
        font-size: 1.5rem;
        color: #334155;
        margin-bottom: 1rem;
        margin-top: 1rem;
      }
      p,
      li {
        font-size: 1.25rem;
        line-height: 1.6;
        color: #334155;
        margin-bottom: 0.8rem;
      }
      ul {
        margin-left: 2rem;
        margin-bottom: 1rem;
      }
      .highlight {
        color: #0369a1;
        font-weight: 700;
        background: linear-gradient(120deg, #e0f2fe 0%, #e0f2fe 100%);
        background-repeat: no-repeat;
        background-size: 100% 40%;
        background-position: 0 80%;
      }

      /* 슬라이드 내부 레이아웃 */
      .slide-content {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .slide-content.top-align {
        justify-content: flex-start;
      }
      .col-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 3rem;
        align-items: start;
      }
      .col-3 {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 2rem;
        align-items: start;
      }

      /* 프롬프트 카드 */
      .prompt-card {
        background-color: #f8fafc;
        border: 1px solid #cbd5e1;
        border-left: 6px solid #0284c7;
        padding: 1.5rem;
        border-radius: 8px;
        margin: 1rem 0;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
        font-size: 1.1rem;
        color: #0f172a;
        line-height: 1.5;
      }
      .prompt-title {
        font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', 'Segoe UI', Arial, sans-serif;
        font-size: 1rem;
        color: #64748b;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
        font-weight: 700;
      }

      /* 파이썬 코드 블록 */
      .code-block {
        background-color: #1e293b;
        color: #f8fafc;
        padding: 1.5rem;
        border-radius: 8px;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
        font-size: 1.1rem;
        overflow: hidden;
        margin: 1rem 0;
        line-height: 1.4;
      }
      .code-comment {
        color: #94a3b8;
      }
      .code-keyword {
        color: #38bdf8;
      }
      .code-string {
        color: #a3e635;
      }
      .code-func {
        color: #fcd34d;
      }

      /* 경고 / 강조 카드 */
      .alert-card {
        background-color: #fef2f2;
        border-left: 6px solid #ef4444;
        padding: 1.5rem;
        border-radius: 8px;
        margin: 1rem 0;
      }
      .alert-card h4 {
        color: #b91c1c;
        font-size: 1.3rem;
        margin-bottom: 0.5rem;
      }
      .info-card {
        background-color: #f0fdf4;
        border-left: 6px solid #22c55e;
        padding: 1.5rem;
        border-radius: 8px;
        margin: 1rem 0;
      }

      /* 시각화 CSS 도형 / 다이어그램 */
      .pipeline-diagram {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 2rem 0;
        background: #f1f5f9;
        padding: 2rem;
        border-radius: 12px;
      }
      .pipeline-box {
        background: #ffffff;
        border: 2px solid #0ea5e9;
        padding: 1.5rem;
        border-radius: 8px;
        text-align: center;
        font-weight: 700;
        font-size: 1.2rem;
        flex: 1;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
      }
      .pipeline-arrow {
        color: #0ea5e9;
        font-size: 2rem;
        margin: 0 1rem;
        font-weight: bold;
      }

      .did-table {
        width: 100%;
        border-collapse: collapse;
        margin: 2rem 0;
        text-align: center;
      }
      .did-table th,
      .did-table td {
        border: 1px solid #cbd5e1;
        padding: 1.5rem;
        font-size: 1.2rem;
      }
      .did-table th {
        background-color: #f8fafc;
        font-weight: 700;
        color: #0f172a;
      }
      .did-cell-highlight {
        background-color: #e0f2fe;
        font-weight: 700;
        color: #0369a1;
      }

      /* 페이지 번호 */
      .page-num {
        position: absolute;
        bottom: 4%;
        right: 5%;
        font-size: 1.5rem;
        font-weight: 700;
        color: #94a3b8;
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', monospace;
      }
      .footer-logo {
        position: absolute;
        bottom: 4%;
        left: 5%;
        font-size: 1.1rem;
        font-weight: 500;
        color: #94a3b8;
      }
      @media print {
        body {
          background: #ffffff;
          padding: 0;
        }
        .top-nav {
          display: none;
        }
        .deck {
          gap: 0;
          margin-top: 0;
        }
        .slide {
          width: 100%;
          max-width: none;
          border-radius: 0;
          box-shadow: none;
          margin: 0;
          break-after: page;
          page-break-after: always;
        }
      }

      @media (max-width: 1100px) {
        body {
          padding: 88px 12px 36px;
        }
        .slide {
          width: 96vw;
          padding: 4.5% 4.5%;
        }
        h1 {
          font-size: 2.6rem;
        }
        h2 {
          font-size: 2rem;
        }
        h3 {
          font-size: 1.2rem;
        }
        p,
        li,
        .prompt-card,
        .code-block {
          font-size: 1rem;
        }
        .col-2,
        .col-3 {
          grid-template-columns: 1fr;
          gap: 1.25rem;
        }
        .pipeline-diagram {
          flex-direction: column;
          gap: 1rem;
        }
        .pipeline-arrow {
          transform: rotate(90deg);
          margin: 0;
        }
      }
    </style>
